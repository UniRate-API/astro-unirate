name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  smoke-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install library deps
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Start mock UniRate API
        run: |
          python3 -u .github/scripts/mock_api.py >/tmp/mock_api.log 2>&1 &
          echo $! > /tmp/mock_api.pid
          for _ in $(seq 1 50); do
            if curl -fs 'http://127.0.0.1:9999/api/rates?from=USD' >/dev/null; then
              echo "mock API up"; exit 0
            fi
            sleep 0.1
          done
          echo "mock API never came up"; cat /tmp/mock_api.log; exit 1

      - name: Install exampleSite deps
        working-directory: exampleSite
        run: npm install --no-audit --no-fund

      - name: Build exampleSite
        working-directory: exampleSite
        env:
          UNIRATE_API_KEY: ci-test-key
          UNIRATE_API_BASE_URL: http://127.0.0.1:9999
        run: npx astro build

      - name: Assert rendered output
        working-directory: exampleSite
        run: |
          echo "--- dist/index.html ---"
          cat dist/index.html
          echo "-----------------------"
          grep -q '92.50'      dist/index.html || { echo "missing USD→EUR conversion (92.50)"; exit 1; }
          grep -q '39.50'      dist/index.html || { echo "missing USD→GBP conversion (39.50)"; exit 1; }
          grep -q 'EUR 92.50'  dist/index.html || { echo "missing currencyDisplay=code rendering"; exit 1; }
          grep -q '0.9250'     dist/index.html || { echo "missing USD/EUR rate"; exit 1; }
          grep -q '0.854054'   dist/index.html || { echo "missing derived EUR/GBP cross-rate"; exit 1; }

      - name: Stop mock API
        if: always()
        run: kill "$(cat /tmp/mock_api.pid)" 2>/dev/null || true
